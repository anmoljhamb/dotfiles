# Fonts
font_family      JetBrainsMono Nerd Font
font_size        19.0

disable_ligatures no
enable_audio_bell no

shell zsh
shell_integration disabled

url_style curly

remember_window_size no

corsor_blink_interval 0

scrollbar_handle_opactiy 0
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0

confirm_os_window_close 0

sync_to_monitor no

# Window
background_opacity 0.75
window_padding_width 6 6

# Scrolling
scrollback_lines 10000

# Cursor — Tokyo Night blue
cursor #7aa2f7
cursor_text_color #1a1b26

# Colors - Tokyo Night
background #1a1b26
foreground #c0caf5

# Normal colors
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

# Bright colors
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# Indexed colors
color16 #ff9e64
color17 #db4b4b

# Environment
env LANG=en_US.UTF-8
env LC_CTYPE=en_US.UTF-8
env TERM=kitty

map ctrl+shift+r load_config_file
