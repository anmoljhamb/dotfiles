background {
    monitor =
    path = screenshot
    color = rgba(26, 27, 38, 1.0)
    blur_passes = 3
    blur_size = 6
}

input-field {
    monitor =
    size = 250, 55
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(65, 72, 104)
    inner_color = rgb(36, 40, 59)
    font_color = rgb(192, 202, 245)
    fade_on_empty = true
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    check_color = rgb(122, 162, 247)
    fail_color = rgb(247, 118, 142)
    position = 0, -20
    halign = center
    valign = center
    border_color = rgb(122, 162, 247)
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(192, 202, 245, 1.0)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = -100, 70
    halign = right
    valign = bottom
    shadow_passes = 5
    shadow_size = 10
    shadow_color = rgba(26, 27, 38, 0.6)
}
