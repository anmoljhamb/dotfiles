windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# ───────────────────────────────────────────────
# Floating window rules
# ───────────────────────────────────────────────

# Audio / Bluetooth / Network (with center + size)
windowrule {
    name = float-pavucontrol
    match:class = ^(.*pavucontrol.*)$
    float = yes
    center = yes
    size = 800 500
}
windowrule {
    name = float-blueman
    match:class = ^(blueman-manager)$
    float = yes
    center = yes
    size = 700 450
}
windowrule {
    name = float-nm-editor
    match:class = ^(nm-connection-editor)$
    float = yes
    center = yes
    size = 700 450
}
windowrule = match:class ^(nm-applet)$, float yes

# File managers
windowrule = match:class ^(nemo)$, float yes
windowrule = match:class ^(thunar)$, float yes
windowrule = match:class ^(pcmanfm)$, float yes
windowrule = match:class ^(org.gnome.Nautilus)$, float yes

# System / Settings apps
windowrule = match:class ^(gnome-control-center)$, float yes
windowrule = match:class ^(gnome-calculator)$, float yes
windowrule = match:class ^(gnome-calendar)$, float yes
windowrule = match:class ^(gnome-clocks)$, float yes
windowrule = match:class ^(gnome-system-monitor)$, float yes
windowrule = match:class ^(gnome-screenshot)$, float yes
windowrule = match:class ^(org.gnome.Settings)$, float yes
windowrule = match:class ^(org.gnome.tweaks)$, float yes
windowrule = match:class ^(cinnamon-settings)$, float yes
windowrule = match:class ^(lxappearance)$, float yes
windowrule = match:class ^(nwg-look)$, float yes
windowrule = match:class ^(qt5ct)$, float yes
windowrule = match:class ^(qt6ct)$, float yes
windowrule = match:class ^(kvantummanager)$, float yes

# Image viewers / Media
windowrule = match:class ^(eog)$, float yes
windowrule = match:class ^(shotwell)$, float yes
windowrule = match:class ^(feh)$, float yes
windowrule = match:class ^(imv)$, float yes
windowrule = match:class ^(mpv)$, float yes
windowrule = match:class ^(vlc)$, float yes

# Archive managers
windowrule = match:class ^(file-roller)$, float yes
windowrule = match:class ^(org.gnome.FileRoller)$, float yes
windowrule = match:class ^(xarchiver)$, float yes

# Dialogs / Popups / Utilities
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float yes
windowrule = match:class ^(xdg-desktop-portal-hyprland)$, float yes
windowrule = match:class ^(zenity)$, float yes
windowrule = match:class ^(yad)$, float yes
windowrule = match:class ^(polkit-gnome-authentication-agent-1)$, float yes

# Color pickers
windowrule = match:class ^(hyprpicker)$, float yes
windowrule = match:class ^(gcolor3)$, float yes

# KDE apps
windowrule = match:class ^(org.kde.dolphin)$, float yes
windowrule = match:class ^(org.kde.ark)$, float yes

# Misc utilities
windowrule = match:class ^(GParted)$, float yes
windowrule = match:class ^(baobab)$, float yes
windowrule = match:class ^(gnome-disks)$, float yes
windowrule = match:class ^(bitwarden)$, float yes
windowrule = match:class ^(1Password)$, float yes
windowrule = match:class ^(qalculate-gtk)$, float yes

# Generic dialog titles (Open/Save/Properties/etc.)
windowrule = match:title ^(Open File)(.*), float yes
windowrule = match:title ^(Save File)(.*), float yes
windowrule = match:title ^(Open Folder)(.*), float yes
windowrule = match:title ^(Save As)(.*), float yes
windowrule = match:title ^(Choose Files)(.*), float yes
windowrule = match:title ^(Confirm)(.*), float yes
windowrule = match:title ^(Properties)(.*), float yes
windowrule = match:title ^(Preferences)(.*), float yes
windowrule = match:title ^(About )(.*), float yes

# ───────────────────────────────────────────────
# Layer rules — blur for panels and notifications
# ───────────────────────────────────────────────
layerrule {
  name = swaync-control-center-blur
  blur = on
  ignore_alpha = 0.3
  match:namespace = swaync-control-center
}

layerrule {
  name = swaync-notification-blur
  blur = on
  ignore_alpha = 0.3
  match:namespace = swaync-notification-window
}

layerrule {
  name = waybar-blur
  blur = on
  ignore_alpha = 0.3
  match:namespace = waybar
}

# Floating system modules (Waybar clicks)
windowrule {
    name = float-system-btop
    match:class = ^(floating-terminal)$
    float = yes
    center = yes
    size = 1400 900
}

windowrule {
    name = float-google-calendar
    match:title = ^(.*Calendar.*)$
    float = yes
    center = yes
    size = 1000 650
}
