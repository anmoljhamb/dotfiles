# Programs
$terminal = kitty
$fileManager = dolphin
$menu = rofi 

# Input configuration
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        clickfinger_behavior = true
        tap-to-click = true
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# Keybindings
$mainMod = SUPER

bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, pkill rofi || rofi -show drun -modi drun,filebrowser,run,window
bind = $mainMod, P, pseudo, # dwindle
# removed: bind = $mainMod, J, layoutmsg, togglesplit (conflicts with movefocus d)
bind = $mainMod SHIFT, B, exec, /home/anmol/.config/waybar/scripts/launch.sh || pkill waybar

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus with hjkl
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Swap windows with SHIFT + hjkl
bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, l, swapwindow, r
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, j, swapwindow, d

# Toggle splits for dwindle layout
bind = $mainMod SHIFT, Return, togglesplit

# Maximize / Fullscreen
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, F, fullscreen, 0

# Toggle Floating
bind = $mainMod, V, togglefloating

# Browser and Music
bind = ALT SHIFT, 1, exec, google-chrome-stable
bind = ALT SHIFT, M, exec, google-chrome-stable --app="https://music.youtube.com"

# Groups
bind = $mainMod, G, togglegroup
bind = ALT, H, changegroupactive, b
bind = ALT, L, changegroupactive, f
bind = $mainMod CTRL, h, moveintogroup, l
bind = $mainMod CTRL, l, moveintogroup, r
bind = $mainMod CTRL, k, moveintogroup, u
bind = $mainMod CTRL, j, moveintogroup, d
bind = $mainMod CTRL, g, moveoutofgroup

# Media shortcuts (Playerctl)
bind = $mainMod, space, exec, playerctl play-pause
bind = $mainMod, X, exec, playerctl next
bind = $mainMod, Z, exec, playerctl previous

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, F, movetoworkspace, special:magic

# Scroll through existing workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, ~/dotfiles/scripts/volume.sh up
bindel = ,XF86AudioLowerVolume, exec, ~/dotfiles/scripts/volume.sh down
bindel = ,XF86AudioMute, exec, ~/dotfiles/scripts/volume.sh mute
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, ~/dotfiles/scripts/brightness.sh up
bindel = ,XF86MonBrightnessDown, exec, ~/dotfiles/scripts/brightness.sh down

# Screenshot to clipboard
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
# Save clipboard image to file (with save dialog)
bind = $mainMod CTRL, S, exec, ~/.config/hypr/scripts/screenshot.sh

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Additional custom bindings
# Map Alt+Backspace to delete a word (Ctrl+Backspace)
bind = ALT, BackSpace, exec, ~/.config/hypr/scripts/delete_word.sh

# Lock screen bindings
bind = ALT SHIFT, L, exec, hyprlock
bindl = , switch:on:Lid Switch, exec, hyprlock
bindl = , switch:off:Lid Switch, exec, hyprlock
bindl = , XF86ScreenSaver, exec, hyprlock

# Keybinding cheatsheet
bind = $mainMod, slash, exec, ~/.config/hypr/scripts/keybind_help.sh

# Submaps

# Resize Mode
bind = $mainMod SHIFT, R, submap, resize
submap = resize
binde = , l, resizeactive, 10 0
binde = , h, resizeactive, -10 0
binde = , k, resizeactive, 0 -10
binde = , j, resizeactive, 0 10
binde = , right, resizeactive, 10 0
binde = , left, resizeactive, -10 0
binde = , up, resizeactive, 0 -10
binde = , down, resizeactive, 0 10
bind = , escape, submap, reset
submap = reset

# Wallpaper Mode (wpaperd)
bind = $mainMod SHIFT, W, submap, wallpaper
submap = wallpaper
bind = , l, exec, wpaperd -n
bind = , h, exec, wpaperd -p
bind = , escape, submap, reset
submap = reset

# Power Menu
bind = $mainMod SHIFT, P, submap, power
submap = power
bind = , p, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = , r, exec, systemctl reboot
bind = , s, exec, systemctl poweroff
bind = , escape, submap, reset
submap = reset
